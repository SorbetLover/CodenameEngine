name: Linux Builds

on:
  push:
  workflow_dispatch:

jobs:
  build:
    if: contains(github.event.head_commit.message, '&buildlin')

    name: Linux Build
    permissions: write-all
    runs-on: ubuntu-24.04
    steps:
      - name: Pulling the new commit
        uses: actions/checkout@v4
        
      - name: Setting up Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7
          
      - name: Configurar sistema
        run: |
          # Configurar haxelib
          haxelib setup ~/haxelib
          
          # Instalar ferramentas de compilação
          sudo apt-get update
          sudo apt-get install -y neko neko-dev libgc-dev
          
      - name: Instalar dependências do projeto
        run: |
          # Instalar dependências principais
          haxelib install lime
          haxelib install hxcpp
          
          # Outras dependências que seu projeto precisa
          haxe -cp commandline -D analyzer-optimize --run Main setup -s
          
      - name: Installing LibVLC
        run: |
          sudo apt-get install -y libvlc-dev libvlccore-dev vlc
          
      - name: Compilar projeto
        run: |
          # Limpar tudo
          rm -rf ~/.hxcpp
          haxelib run lime clean linux
          
          # Build com recompilação forçada do hxcpp
          haxelib run lime build linux -release -D HXCPP_REBUILD_ALL
          
      - name: Verificar build
        run: |
          if [ -f "export/release/linux/bin/CodenameEngine" ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed!"
            exit 1
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodenameEngine-Linux
          path: export/release/linux/bin/
